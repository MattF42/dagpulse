# ─────────────────────────────────────────────────────────────────────────────
# DAGPulse – HTTP-only nginx config (for local testing / behind a TLS proxy)
# ─────────────────────────────────────────────────────────────────────────────

upstream grpcwebproxy {
    server grpcwebproxy:8080;
    keepalive 32;
}

server {
    listen 80;
    server_name _;

    root /var/www/dagpulse;

    location /dagpulse/ {
        alias /var/www/dagpulse/;
        try_files $uri $uri/ /dagpulse/index.html;
        expires 1h;
    }

    location /protowire.RPC/ {
        proxy_pass         http://grpcwebproxy;
        proxy_http_version 1.1;
        proxy_set_header   Host            $host;
        proxy_set_header   X-Real-IP       $remote_addr;
        proxy_read_timeout  3600s;
        proxy_send_timeout  3600s;
        proxy_buffering     off;
        proxy_cache         off;

        add_header 'Access-Control-Allow-Origin'   '*'                                               always;
        add_header 'Access-Control-Allow-Methods'  'POST, OPTIONS'                                   always;
        add_header 'Access-Control-Allow-Headers'  'Content-Type, X-Grpc-Web, X-User-Agent, grpc-timeout' always;
        add_header 'Access-Control-Expose-Headers' 'grpc-status, grpc-message'                       always;

        if ($request_method = OPTIONS) {
            add_header 'Access-Control-Allow-Origin'  '*';
            add_header 'Access-Control-Allow-Methods' 'POST, OPTIONS';
            add_header 'Access-Control-Allow-Headers' 'Content-Type, X-Grpc-Web, X-User-Agent, grpc-timeout';
            add_header 'Access-Control-Max-Age'       86400;
            return 204;
        }
    }
}
