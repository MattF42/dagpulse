# ─────────────────────────────────────────────────────────────────────────────
# DAGPulse – nginx reverse-proxy configuration
#
# !! BEFORE DEPLOYING: replace every occurrence of 'your-domain.example.com'
#    with your actual domain name (there are multiple occurrences).
#
# Architecture
# ────────────
#
#   Browser (HTTPS)
#     │
#     ▼
#   nginx  ──── /dagpulse/    ──────────────────► static SPA files
#     │
#     └────── /dagpulse/ws    ────────────────────► dagpulse bridge (port 8765)
#                                                      │  WebSocket → gRPC
#                                                      ▼
#                                                  HTND node (gRPC, port 42420)
#
# The dagpulse bridge holds a native gRPC connection to HTND and fans out live
# block notifications to all connected browser WebSocket clients.
#
# Quick start (bridge)
# ──────────────────────────
#
#   cd bridge
#   pip install -r requirements.txt
#   python main.py
#
# Build the app for production
# ─────────────────────────────
#
#   npm run build
#   # Copy dist/ to /var/www/dagpulse (or adjust the paths below)
#
# ─────────────────────────────────────────────────────────────────────────────

# ── HTTP → HTTPS redirect ─────────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name your-domain.example.com;          # ← change to your domain

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── Main HTTPS server ─────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;

    server_name your-domain.example.com;          # ← change to your domain

    # ── TLS (use certbot / Let's Encrypt or your own certs) ──────────────────
    ssl_certificate     /etc/letsencrypt/live/your-domain.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/your-domain.example.com/privkey.pem;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    # ── Static SPA ────────────────────────────────────────────────────────────
    root /var/www/dagpulse;                        # ← path to built dist/

    # If you build with base: '/dagpulse/' (the default for GitHub Pages),
    # serve the app under that sub-path:
    location /dagpulse/ {
        alias /var/www/dagpulse/;
        try_files $uri $uri/ /dagpulse/index.html;
        expires 1h;
        add_header Cache-Control "public, must-revalidate";
    }

    # For a root deployment (build with base: '/') uncomment these instead:
    # location / {
    #     try_files $uri $uri/ /index.html;
    #     expires 1h;
    #     add_header Cache-Control "public, must-revalidate";
    # }

    # ── WebSocket bridge proxy ────────────────────────────────────────────────
    # Forwards browser WebSocket connections to the DAGPulse bridge → HTND node.
    location /dagpulse/ws {
        proxy_pass http://127.0.0.1:8765/ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # ── Security headers ──────────────────────────────────────────────────────
    add_header X-Frame-Options        SAMEORIGIN;
    add_header X-Content-Type-Options nosniff;
    add_header Referrer-Policy        strict-origin-when-cross-origin;
}
