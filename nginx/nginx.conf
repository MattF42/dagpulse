# ─────────────────────────────────────────────────────────────────────────────
# DAGPulse – nginx reverse-proxy configuration
#
# !! BEFORE DEPLOYING: replace every occurrence of 'your-domain.example.com'
#    with your actual domain name (there are multiple occurrences).
#
# Architecture
# ────────────
#
#   Browser (HTTPS)
#     │
#     ▼
#   nginx  ──── /  ──────────────────────► static SPA files
#     │
#     └────── /protowire.RPC/ ────────────► grpcwebproxy (port 8080)
#                                              │
#                                              ▼
#                                          HTND node (gRPC, port 16110)
#
# grpcwebproxy translates browser gRPC-web (HTTP/1.1) into standard gRPC
# (HTTP/2) which the HTND node understands.
#
# Quick start (grpcwebproxy)
# ──────────────────────────
#
#   # Install (requires Go 1.21+)
#   go install github.com/improbable-eng/grpc-web/go/grpcwebproxy@latest
#
#   # Run (keep this running alongside HTND)
#   grpcwebproxy \
#     --backend_addr=localhost:16110 \
#     --allow_all_origins \
#     --run_tls_server=false \
#     --server_http_debug_port=8080
#
# Build the app for production
# ─────────────────────────────
#
#   # Leave VITE_RPC_HOST unset (empty = same origin, nginx proxies it)
#   npm run build
#   # Copy dist/ to /var/www/dagpulse (or adjust the paths below)
#
# ─────────────────────────────────────────────────────────────────────────────

# Upstream: grpcwebproxy translates gRPC-web → gRPC for the HTND node
upstream grpcwebproxy {
    server 127.0.0.1:8080;
    keepalive 32;
}

# ── HTTP → HTTPS redirect ─────────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name your-domain.example.com;          # ← change to your domain

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── Main HTTPS server ─────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;

    server_name your-domain.example.com;          # ← change to your domain

    # ── TLS (use certbot / Let's Encrypt or your own certs) ──────────────────
    ssl_certificate     /etc/letsencrypt/live/your-domain.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/your-domain.example.com/privkey.pem;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    # ── Static SPA ────────────────────────────────────────────────────────────
    root /var/www/dagpulse;                        # ← path to built dist/

    # If you build with base: '/dagpulse/' (the default for GitHub Pages),
    # serve the app under that sub-path:
    location /dagpulse/ {
        alias /var/www/dagpulse/;
        try_files $uri $uri/ /dagpulse/index.html;
        expires 1h;
        add_header Cache-Control "public, must-revalidate";
    }

    # For a root deployment (build with base: '/') uncomment these instead:
    # location / {
    #     try_files $uri $uri/ /index.html;
    #     expires 1h;
    #     add_header Cache-Control "public, must-revalidate";
    # }

    # ── gRPC-web proxy ────────────────────────────────────────────────────────
    # Forwards browser gRPC-web requests to grpcwebproxy → HTND node.
    location /protowire.RPC/ {
        proxy_pass         http://grpcwebproxy;
        proxy_http_version 1.1;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Keep the connection open for long-lived streaming subscriptions
        # (NotifyBlockAdded can stay open indefinitely at 5 BPS).
        proxy_read_timeout  3600s;
        proxy_send_timeout  3600s;

        # Disable buffering so frames reach the browser immediately
        proxy_buffering     off;
        proxy_cache         off;

        # gRPC-web CORS – required when the SPA origin differs from this server
        add_header 'Access-Control-Allow-Origin'   '*'                                               always;
        add_header 'Access-Control-Allow-Methods'  'POST, OPTIONS'                                   always;
        add_header 'Access-Control-Allow-Headers'  'Content-Type, X-Grpc-Web, X-User-Agent, grpc-timeout' always;
        add_header 'Access-Control-Expose-Headers' 'grpc-status, grpc-message'                       always;

        if ($request_method = OPTIONS) {
            add_header 'Access-Control-Allow-Origin'   '*';
            add_header 'Access-Control-Allow-Methods'  'POST, OPTIONS';
            add_header 'Access-Control-Allow-Headers'  'Content-Type, X-Grpc-Web, X-User-Agent, grpc-timeout';
            add_header 'Access-Control-Max-Age'        86400;
            return 204;
        }
    }

    # ── Security headers ──────────────────────────────────────────────────────
    add_header X-Frame-Options        SAMEORIGIN;
    add_header X-Content-Type-Options nosniff;
    add_header Referrer-Policy        strict-origin-when-cross-origin;
}
